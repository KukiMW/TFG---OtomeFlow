<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Otome Flow es una plataforma educativa gratuita para crear, jugar y compartir novelas visuales interactivas y juegos narrativos sin código.">
    <title>Jugando Historia</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #711651; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #exitGameBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            padding: 8px 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #exitGameBtn:hover { background: rgba(255,0,0,0.7); }
    </style>
</head>
<body>

    <!-- PANTALLA DE CARGA -->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <h2 id="loadingText">Cargando historia...</h2>
    </div>

    <!-- JUEGO -->
    <div id="game">
        <button id="exitGameBtn">Salir</button>
        <img id="background" class="background" alt="Fondo de la escena">
        <img id="character" class="character" alt="Personaje en pantalla">
        <div id="textbox" class="textbox">
            <span id="text-content"></span>
            <span id="next-arrow" class="arrow circle"></span>
        </div>
        <div id="choices" class="choices"></div>
        
    </div>

    <script src="supabaseClient.js"></script>
    
    <script type="module">
        import { Engine } from './engine/Engine.js';

        const otomeFlow = new Engine();
        const loadingScreen = document.getElementById('loadingScreen');
        const loadingText = document.getElementById('loadingText');

        async function initGame() {
            // 1. Obtener ID de la URL
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');

            if (!projectId) {
                alert("Error: ID de juego no especificado.");
                window.location.href = "dashboard.html";
                return;
            }

            try {
                // 2. Descargar datos de Supabase
                const { data, error } = await sb
                    .from('projects')
                    .select('story_data')
                    .eq('id', projectId)
                    .single();

                if (error) throw error;
                if (!data.story_data) throw new Error("Este proyecto está vacío o corrupto.");

                console.log("Historia cargada:", data.story_data);

                // 3. Iniciar Motor (El JSON ya tiene las URLs públicas de Supabase)
                otomeFlow.loadStoryFromData(data.story_data);
                
                // Ocultar carga y empezar
                loadingScreen.style.display = 'none';
                document.getElementById('game').style.display = 'block';
                otomeFlow.start();

            } catch (err) {
                console.error(err);
                loadingText.innerText = "Error: " + err.message;
            }
        }

        document.getElementById('exitGameBtn').addEventListener('click', () => {
            if(confirm("¿Seguro que quieres salir? Se perderá el progreso no guardado.")) {
                window.location.href = "dashboard.html";
            }
        });
        // Arrancar cuando cargue la ventana
        window.onload = initGame;
    </script>
</body>
</html>
