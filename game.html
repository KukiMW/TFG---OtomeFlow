<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Configuracion del viewport estricta para evitar redimensionamientos no deseados en dispositivos moviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Otome Flow es una plataforma educativa gratuita para crear, jugar y compartir novelas visuales interactivas y juegos narrativos sin código.">
    <title>Jugando Historia</title>
    
    <!-- Dependencias externas e internas -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/OF.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    

    <!-- Estilos en linea exclusivos para componentes de la interfaz de ejecucion -->
    <style>
        /* Capa de bloqueo para carga asincrona inicial */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #711651; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Boton de interrupcion de ejecucion */
        #exitGameBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            padding: 8px 15px;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #exitGameBtn:hover { background: rgba(255,0,0,0.7); }
    </style>
</head>
<body>

    <!--------------------------------------------
         PANTALLA DE CARGA (PRE-RENDERIZADO)
    ---------------------------------------------->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <h2 id="loadingText">Cargando historia...</h2>
    </div>

    <!--------------------------------------------
         CONTENEDOR PRINCIPAL DEL MOTOR (DOM)
    ---------------------------------------------->
    <!-- Este contenedor permanece oculto hasta que se resuelve el JSON de la base de datos -->
    <div id="game" style="display: none;">
        <button id="exitGameBtn">Salir</button>
        
        <!-- Capas de renderizado gestionadas por Engine.js -->
        <img id="background" class="background" alt="Fondo de la escena">
        <img id="character" class="character" alt="Personaje en pantalla">
        
        <!-- Interfaz de lectura y dialogo -->
        <div id="textbox" class="textbox">
            <span id="text-content"></span>
            <span id="next-arrow" class="arrow circle"></span>
        </div>
        
        <!-- Contenedor para inyeccion dinamica de nodos de decision -->
        <div id="choices" class="choices"></div>
    </div>

    <!-- Archivo de conexion BaaS -->
    <script src="supabaseClient.js"></script>
    
    <!-- Logica de inicializacion del cliente -->
    <script type="module">
        // Importacion del nucleo del motor
        import { Engine } from './engine/Engine.js';

        const otomeFlow = new Engine();
        const loadingScreen = document.getElementById('loadingScreen');
        const loadingText = document.getElementById('loadingText');

        /**
         * Inicializa la partida solicitando los datos compilados a la base de datos
         * utilizando el parametro ID proporcionado en la URL.
         */
        async function initGame() {
            // 1. Extraccion de parametros GET de la URL
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');

            if (!projectId) {
                alert("Error: ID de juego no especificado.");
                window.location.href = "dashboard.html";
                return;
            }

            try {
                // 2. Consulta asincrona del codigo fuente de la historia (story_data)
                const { data, error } = await sb
                    .from('projects')
                    .select('story_data')
                    .eq('id', projectId)
                    .single();

                if (error) throw error;
                if (!data.story_data) throw new Error("Este proyecto está vacío o corrupto.");

                // 3. Inyeccion de dependencias en el Motor
                otomeFlow.loadStoryFromData(data.story_data);
                
                // 4. Transicion de estado de la interfaz y arranque del Game Loop
                loadingScreen.style.display = 'none';
                document.getElementById('game').style.display = 'block';
                otomeFlow.start();

            } catch (err) {
                console.error(err);
                loadingText.innerText = "Error: " + err.message;
            }
        }

        /**
         * Manejador de eventos para interrupcion de la partida.
         * Advierte al usuario sobre la perdida de datos de telemetria no guardados.
         */
        document.getElementById('exitGameBtn').addEventListener('click', async () => {
            const { isConfirmed } = await Swal.fire({
                title: '¿Seguro que quieres salir?',
                text: "Se perderá el progreso de esta partida.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#711651',
                cancelButtonColor: '#888',
                confirmButtonText: 'Sí, salir',
                cancelButtonText: 'Cancelar'
            });

            if (isConfirmed) {
                window.location.href = "dashboard.html";
            }
        });

        // Evento disparador del ciclo de vida de la pagina
        window.onload = initGame;
    </script>
</body>
</html>
