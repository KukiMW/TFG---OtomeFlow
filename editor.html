<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Otome Flow es una plataforma educativa gratuita para crear, jugar y compartir novelas visuales interactivas y juegos narrativos sin código.">
    <title>Otome Flow - Editor Visual</title>
    <!-- CSS -->
    <link rel="stylesheet" href="editor_style.css">
    <!-- Iconos Material (Opcional, pero recomendado para flechas bonitas) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/OF.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- 1. BARRA SUPERIOR (HEADER) -->
    <header id="top-bar">
        <div class="header-left">
            <!-- El título ahora es el botón de volver -->
            <a href="index.html" class="home-link" title="Volver al Menú Principal">
                <span class="material-icons">home</span>
                <h1>OTOME EDITOR</h1>
            </a>
        </div>
        <div class="header-right">
            <!-- Aquí podrías poner usuario o configuración en el futuro -->
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL (Flex) -->
    <div id="main-wrapper">

        <!-- 2. SIDEBAR IZQUIERDA -->
        <aside id="sidebar-left">
            <div class="section">
                <h3>Añadir</h3>
                <label for="bgInput">1. Fondo:</label>
                <input type="file" id="bgInput" accept="image/*">
                
                <hr class="divider">
                
                <label for="newCharName">2. Personaje:</label>
                <div class="input-group">
                    <input type="text" id="newCharName" placeholder="Nombre">
                    <button id="addCharBtn">+</button>
                </div>
                
                <label for="editChar">3. Editar:</label>
                <select id="charSelector">
                    <option value="" disabled selected>-- Selecciona --</option>
                </select>
                
                <div id="spriteUploadSection" style="display: none; margin-top: 10px;">
                    <label for="newCharSprite">Añadir Sprite a <b id="displayCharName">...</b>:</label>
                    <input type="file" id="spriteInput" accept="image/*">
                </div>
            </div>

            <div class="section">
                <h3>Proyecto</h3>
                <label for="sceneName">Nombre Escena Inicio:</label>
                <input type="text" id="startSceneInput" value="inicio">
                
                <hr class="divider">
                
                <!-- AHORA SOLO GUARDAMOS EN LA NUBE -->
                <button id="saveCloudBtn" class="btn-save-scene" style="padding:15px; font-size:1rem;">
                    GUARDAR EN LA NUBE
                </button>
                
                <div style="margin-top:10px; text-align:center;">
                    <a href="dashboard.html" style="color:#711651; text-decoration:underline; font-size:0.8rem;">Volver al Dashboard</a>
                </div>
            </div>
        </aside>

        <!-- 3. PESTAÑA DE COLAPSO IZQUIERDA -->
        <div id="sidebarToggle" title="Contraer/Expandir">
            <span class="material-icons">chevron_left</span>
        </div>

        <!-- 4. CENTRO: BLOCKLY -->
        <main id="blocklyArea">
            <div id="blocklyDiv"></div>
        </main>

        <!-- 5. PESTAÑA DE COLAPSO DERECHA -->
        <div id="sidebarRightToggle" title="Contraer/Expandir">
            <span class="material-icons">chevron_right</span>
        </div>


        <!-- 6. DERECHA: ESCENAS -->
        <aside id="sidebar-right">
            <div class="section scene-section">
                <h3>🎬 Escenas</h3>
                <div class="scene-controls">
                    <button id="newSceneBtn" class="btn-new-scene">Nueva</button>
                    <button id="saveSceneBtn" class="btn-save-scene">Guardar</button>
                    <button id="viewTreeBtn" class="btn-tree">Árbol</button>
                </div>
                <div id="sceneList"><p class="empty-msg">Vacío</p></div>
            </div>

            <h3>Archivos</h3>
            <div id="assetList"><p class="empty-msg">Vacío</p></div>
        </aside>

    </div>

    <!-- MODAL ÁRBOL -->
    <div id="treeModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Árbol de la Historia</h2>
                <button id="closeTreeBtn" class="close-btn">Cerrar</button>
            </div>
            <div class="modal-body">
                <div id="mermaidGraph" class="mermaid"></div>
            </div>
        </div>
    </div>

    <!-- TOOLBOX XML -->
    <xml xmlns="https://developers.google.com/blockly/xml" id="toolbox" style="display: none">
        <category name="Lógica" colour="210"></category>
    </xml>

    <!-- 1. Librerías Externas -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. Configuración Supabase -->
    <script src="supabaseClient.js"></script>

    <!-- 3. Lógica del Editor -->
    <script src="editor.js"></script>
</body>
</html>

</body>
</html>
