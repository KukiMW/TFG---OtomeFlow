<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otome Flow - Inicio</title>
    <!-- Iconos de Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f3e5f5 0%, #ce93d8 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4a148c;
        }

        h1 {
            font-size: 4.5rem;
            margin-bottom: 5px;
            text-shadow: 3px 3px 0px white;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.3rem;
            margin-bottom: 60px;
            color: #6a1b9a;
            font-weight: 500;
        }

        .menu-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card-btn {
            background: white;
            width: 200px;
            padding: 30px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #4a148c;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(74, 20, 140, 0.1);
            border: 2px solid transparent;
        }

        .card-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(74, 20, 140, 0.2);
            border-color: #ba68c8;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 0.85rem;
            text-align: center;
            color: #7b1fa2;
            opacity: 0.8;
        }

        /* Colores específicos para iconos */
        .icon-create { color: #ab47bc; }
        .icon-class { color: #009688; }
        .icon-play { color: #ef5350; }

    </style>
</head>
<body>

    <h1>Otome Flow</h1>
    <p>Plataforma Educativa de Narrativa Interactiva</p>

    <div class="menu-container">
        
        <!-- 1. CREAR (EDITOR) -->
        <a href="editor.html" class="card-btn">
            <span class="material-icons card-icon icon-create">design_services</span>
            <span class="card-title">Editor Visual</span>
            <span class="card-desc">Crea tus propias historias con bloques.</span>
        </a>

        <!-- 2. GESTIONAR (DASHBOARD) -->
        <a href="dashboard.html" class="card-btn">
            <span class="material-icons card-icon icon-class">school</span>
            <span class="card-title">Classroom</span>
            <span class="card-desc">Profesores y alumnos. Gestiona tareas.</span>
        </a>

        <!-- 3. JUGAR (PLAYER DIRECTO) -->
        <a href="game.html" class="card-btn">
            <span class="material-icons card-icon icon-play">sports_esports</span>
            <span class="card-title">Reproductor</span>
            <span class="card-desc">Carga un archivo ZIP y juega directamente.</span>
        </a>

    </div>

</body>
</html>
