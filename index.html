<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otome Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
    <img id="background" class="background">
    <img id="character" class="character">
    <div id="textbox" class="textbox">
        <span id="text-content"></span>
        <span id="next-arrow" class="arrow circle"></span>
    </div>
    <div id="choices" class="choices"></div>
</div>

<!-- El script principal ahora es mucho más limpio -->
<script type="module">
    import { Engine } from './engine/Engine.js';

    // 1. Crear una instancia del motor
    const otomeFlow = new Engine();

    // 2. Cargar la historia y empezar el juego
    otomeFlow.loadStory('./historiaEjemplo.json').then(() => {
        otomeFlow.start();
    });
</script>
</body>
</html>
