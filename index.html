<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otome Flow - Acceso</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #f3e5f5 0%, #ce93d8 100%); font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; color: #4a148c; }
        .auth-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(74, 20, 140, 0.2); width: 400px; max-height: 90vh; overflow-y: auto; }
        h1 { margin: 0 0 10px; font-size: 2.2rem; text-align: center; }
        p.subtitle { text-align: center; color: #7b1fa2; margin-bottom: 20px; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #f3e5f5; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #ba68c8; transition: 0.3s; }
        .tab.active { color: #711651; border-bottom: 3px solid #711651; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; }
        input[type="text"], input[type="email"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #e1bee7; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; margin-top: 10px; }
        .btn-primary { background: #711651; color: white; }
        .btn-primary:hover { background: #4a0030; }
        .btn-google { background: white; color: #444; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px;}
        .btn-google:hover { background: #f1f1f1; }

        .hidden { display: none !important; }
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>Otome Flow</h1>
        <p class="subtitle">Plataforma Educativa Narrativa</p>

        <!-- Pestañas -->
        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</div>
            <div class="tab" id="tabRegister" onclick="switchTab('register')">Registrarse</div>
        </div>

        <!-- FORMULARIO LOGIN -->
        <div id="loginForm">
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass"></div>
            <button class="btn-primary" onclick="doLogin()">Entrar</button>
            <button class="btn-google" onclick="doGoogleLogin()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20"> Entrar con Google
            </button>
        </div>

        <!-- FORMULARIO REGISTRO -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Soy un...</label>
                <div class="radio-group">
                    <label><input type="radio" name="role" value="student" checked onchange="toggleStudentFields(true)"> 🎓 Alumno</label>
                    <label><input type="radio" name="role" value="teacher" onchange="toggleStudentFields(false)"> 👨‍🏫 Profesor</label>
                </div>
            </div>

            <div class="form-group"><label>Nombre</label><input type="text" id="regName"></div>
            <div class="form-group"><label>Apellidos</label><input type="text" id="regLastname"></div>
            
            <div id="studentFields">
                <div class="form-group"><label>DNI</label><input type="text" id="regDni"></div>
                <div class="form-group"><label>Clase / Grupo (Ej: 3A)</label><input type="text" id="regClass"></div>
            </div>

            <div class="form-group"><label>Email</label><input type="email" id="regEmail"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="regPass"></div>
            
            <button class="btn-primary" onclick="doRegister()">Crear Cuenta</button>
        </div>

        <p id="msg" style="margin-top: 15px; font-size: 0.85rem; text-align: center; color: #d32f2f;"></p>
    </div>

    <script src="supabaseClient.js"></script>
    <script>
        const msgBox = document.getElementById('msg');

        // Comprobar si ya estamos logueados
        window.onload = async () => {
            const { data: { session } } = await window.sb.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        };

        function switchTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            msgBox.innerText = "";
        }

        function toggleStudentFields(show) {
            document.getElementById('studentFields').classList.toggle('hidden', !show);
        }

        async function doLogin() {
            msgBox.style.color = "#333"; msgBox.innerText = "Conectando...";
            const { error } = await window.sb.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPass').value
            });
            if (error) msgBox.innerText = "❌ " + error.message;
            else window.location.href = 'dashboard.html';
        }

        async function doRegister() {
            msgBox.style.color = "#333"; msgBox.innerText = "Registrando...";
            
            const role = document.querySelector('input[name="role"]:checked').value;
            const metadata = {
                role: role,
                first_name: document.getElementById('regName').value,
                last_name: document.getElementById('regLastname').value
            };

            if (role === 'student') {
                metadata.dni = document.getElementById('regDni').value;
                metadata.class_name = document.getElementById('regClass').value;
            }

            const { data, error } = await window.sb.auth.signUp({
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPass').value,
                options: { data: metadata } // Aquí enviamos los datos extra al Trigger de SQL
            });

            if (error) {
                msgBox.style.color = "#d32f2f"; msgBox.innerText = "❌ " + error.message;
            } else {
                msgBox.style.color = "green"; msgBox.innerText = "✅ ¡Cuenta creada! Iniciando sesión...";
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            }
        }

        // LOGIN CON GOOGLE
        async function doGoogleLogin() {
            const { error } = await window.sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/dashboard.html' }
            });
            if (error) alert("Error con Google: " + error.message);
        }
    </script>
</body>
</html>
