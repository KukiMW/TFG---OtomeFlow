<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otome Classroom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Librerías obligatorias -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="logo-text">Otome <b>Classroom</b></span>
        </div>
        <div class="nav-right">
            <!-- SELECTOR DE ROL -->
            <select id="roleSwitch" style="padding:5px; margin-right:15px; border-radius:5px;">
                <option value="teacher">👨‍🏫 Modo Profesor</option>
                <option value="student">🎓 Modo Alumno</option>
            </select>
            
            <button id="logoutBtn" style="background:none; border:none; color:#5f6368; cursor:pointer;">Salir</button>
            <div class="user-avatar" id="userAvatar">U</div>
        </div>
    </nav>

    <div class="main-container">
        <header class="dashboard-header">
            <h1>Mis Proyectos</h1>
            <p>Gestiona tus historias interactivas en la nube</p>
        </header>

        <!-- REJILLA DE PROYECTOS (SE LLENA CON JS) -->
        <div id="gamesGrid" class="games-grid">
            <p>Cargando proyectos...</p>
        </div>
    </div>

    <!-- BOTÓN CREAR -->
    <button id="fabAdd" class="fab" title="Crear nueva historia">+</button>

    <!-- MODAL CREAR -->
    <div id="createModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2>Nueva Historia</h2>
            <form id="createForm">
                <label>Título:</label>
                <input type="text" id="newTitle" required placeholder="Ej: La Revolución Francesa">
                <label>Descripción:</label>
                <textarea id="newDesc" placeholder="Breve descripción..."></textarea>
                <div class="modal-actions">
                    <button type="button" id="closeModal" class="btn-text">Cancelar</button>
                    <button type="submit" class="btn-primary">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <!-- INPUT INVISIBLE PARA IMPORTAR ZIP -->
    <input type="file" id="importInput" accept=".zip" style="display: none;">

    <script src="supabaseClient.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
