<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otome Classroom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <span class="logo-text">Otome <b>Classroom</b></span>
        </div>
        <div class="nav-right">
            <!-- Aquí se inyectará el rol automáticamente -->
            <span id="roleLabel" style="margin-right:15px; color:#5f6368; font-size:0.9rem; font-weight:bold;"></span>
            <button id="logoutBtn" style="background:none; border:none; color:#5f6368; cursor:pointer;">Salir</button>
            <div class="user-avatar" id="userAvatar">U</div>
        </div>
    </nav>

    <div class="main-container">
        <header class="dashboard-header">
            <h1 id="headerTitle">Mis Proyectos</h1>
            <p id="headerSubtitle">Gestiona tus historias interactivas</p>
        </header>

        <div id="gamesGrid" class="games-grid">
            <p>Cargando...</p>
        </div>
    </div>

    <!-- BOTÓN CREAR (Solo profesores) -->
    <button id="fabAdd" class="fab" title="Crear nueva historia" style="display:none;">+</button>

    <!-- MODAL CREAR -->
    <div id="createModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2>Nueva Historia</h2>
            <form id="createForm">
                <label>Título:</label>
                <input type="text" id="newTitle" required placeholder="Ej: La Revolución Francesa">
                <label>Descripción:</label>
                <textarea id="newDesc" placeholder="Breve descripción..."></textarea>
                <div class="modal-actions">
                    <button type="button" id="closeModal" class="btn-text">Cancelar</button>
                    <button type="submit" class="btn-primary">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL ASIGNAR TAREA (MEJORADO) -->
    <div id="assignModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2>📢 Asignar a Alumnos</h2>
            <form id="assignForm">
                <div style="display: flex; gap:10px;">
                    <input type="email" id="studentEmail" placeholder="alumno@ejemplo.com" required style="margin:0;">
                    <button type="submit" class="btn-primary" style="margin:0;">Añadir</button>
                </div>
            </form>
            
            <h3 style="font-size:1rem; margin-top:20px; border-bottom:1px solid #eee; padding-bottom:5px;">Alumnos asignados:</h3>
            <ul id="assignedList" style="list-style:none; padding:0; max-height:150px; overflow-y:auto;">
                <!-- Lista inyectada por JS -->
                <li style="color:#888; font-size:0.9rem;">Cargando lista...</li>
            </ul>

            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('assignModal').style.display='none'" class="btn-text">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL VER NOTAS -->
    <div id="scoresModal" class="modal-overlay" style="display: none;">
        <div class="modal-card" style="max-width: 600px;">
            <h2>📊 Calificaciones</h2>
            <div id="scoresList" style="margin-top:20px; max-height:300px; overflow-y:auto;"></div>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('scoresModal').style.display='none'" class="btn-primary">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="supabaseClient.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
