<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Otome Flow es una plataforma educativa gratuita para crear, jugar y compartir novelas visuales interactivas y juegos narrativos sin código.">
    <title>Otome Classroom - Calificaciones</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .analytics-container {
            max-width: 1200px; margin: 80px auto 20px; padding: 20px;
            background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .filters-bar {
            display: flex; gap: 15px; margin-bottom: 20px; padding: 15px;
            background: #f8f9fa; border-radius: 8px; align-items: center;
        }
        .filters-bar select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; }
        
        .styled-table {
            width: 100%; border-collapse: collapse; margin: 25px 0;
            font-size: 0.95em; font-family: sans-serif;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }
        .styled-table thead tr { background-color: #711651; color: #ffffff; text-align: left; }
        .styled-table th, .styled-table td { padding: 12px 15px; }
        .styled-table tbody tr { border-bottom: 1px solid #dddddd; }
        .styled-table tbody tr:nth-of-type(even) { background-color: #f3e5f5; }
        .styled-table tbody tr:last-of-type { border-bottom: 2px solid #711651; }
        
        .status-done { color: green; font-weight: bold; }
        .status-pending { color: #d32f2f; font-weight: bold; }
        .time-badge { background: #e0c3fc; padding: 3px 8px; border-radius: 12px; font-size: 0.85rem; color: #4a148c; }
        .btn-history { background: #ff9800; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-history:hover { background: #f57c00; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="dashboard.html" class="back-link"><span class="material-icons">arrow_back</span></a>
            <span class="logo-text">Otome <b>Analytics</b></span>
        </div>
        <div class="nav-right">
            <button id="downloadCsvBtn" class="btn-play" style="background:#4caf50;">Exportar a Excel (CSV)</button>
        </div>
    </nav>

    <div class="analytics-container">
        <h2>Cuaderno de Evaluación</h2>
        <p>Consulta el progreso, la dedicación y las calificaciones de tus alumnos.</p>

        <div class="filters-bar">
            <label for="filterProjects"><strong>Filtrar por:</strong></label>
            <select id="filterProject"><option value="all">Todas las tareas (Juegos)</option></select>
            <select id="filterClass"><option value="all">Todas las clases</option></select>
        </div>

        <table class="styled-table" id="analyticsTable">
            <thead>
                <tr>
                    <th>Alumno</th>
                    <th>Clase</th>
                    <th>Tarea (Juego)</th>
                    <th>Estado / Mejor Nota</th>
                    <th>Tiempo invertido</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align: center;">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- MODAL 1: HISTORIAL DE INTENTOS -->
    <div id="historyModal" class="modal-overlay" style="display: none;">
        <div class="modal-card" style="max-width: 600px;">
            <h2 id="historyTitle">Historial de Intentos</h2>
            <div id="historyList" style="margin-top:20px; max-height:300px; overflow-y:auto;">
                <!-- Se llena con JS -->
            </div>
            <div class="modal-actions">
                <button type="button" onclick="document.getElementById('historyModal').style.display='none'" class="btn-primary">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL 2: ÁRBOL DE RUTA MERMAID -->
    <div id="pathModal" class="modal-overlay" style="display: none; z-index: 1100;">
        <div class="modal-card" style="max-width: 800px; width: 90%;">
            <h2>Ruta del Intento</h2>
            <p style="font-size:0.85rem; color:#666;">Secuencia exacta de escenas visitadas.</p>
            <div id="mermaidPath" class="mermaid" style="margin: 20px 0; overflow:auto; max-height: 400px; background:#f9f9f9; padding:15px; border-radius:8px; text-align:center;"></div>
            <div class="modal-actions">
                <button onclick="document.getElementById('pathModal').style.display='none'; document.getElementById('scoresModal').style.display='flex';">Cerrar Ruta</button>            </div>
        </div>
    </div>

    <script src="supabaseClient.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
